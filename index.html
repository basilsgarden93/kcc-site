<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KCC Teams</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      color: white;
      font-family: Arial, sans-serif;
    }
    .wrap {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    iframe {
      width: 100vw;
      height: 100vh;
      border: 0;
    }
    .loading {
      position: absolute;
      z-index: 2;
      text-align: center;
      font-size: 1.3rem;
      opacity: 0.9;
    }
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="loading" class="loading">
    <div>KCC Staff Portal</div>
    <div>Loading team assignments...</div>
  </div>

  <iframe
    id="video"
    class="hidden"
    src="https://www.youtube.com/embed/hvL1339luv0?autoplay=1&mute=1"
    allow="autoplay; fullscreen">
  </iframe>

  <script>
    setTimeout(() => {
      document.getElementById("loading").classList.add("hidden");
      document.getElementById("video").classList.remove("hidden");
    }, 1500);
  </script>
</body>
</html>
