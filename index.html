<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KCC Teams</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      color: #111;
      text-align: center;
    }

    .header-gif {
      width: 100%;
      display: block;
      max-height: 320px;
      object-fit: cover;
      object-position: center;
    }

    .video-wrap {
      width: 100%;
      max-width: 900px;
      margin: 0 auto;
      background: #000;
    }

    .video-wrap iframe {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      border: none;
    }

    footer {
      padding: 18px 12px 28px;
      font-size: 1.2rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <img class="header-gif" src="header.gif" alt="Header GIF">

  <div class="video-wrap">
    <iframe
      src="https://www.youtube.com/embed/hvL1339luv0?autoplay=1&mute=1&rel=0"
      title="April Fools Video"
      allow="autoplay; fullscreen; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>

  <footer>April fools!!!</footer>
</body>
</html>
